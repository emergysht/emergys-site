<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emergys | Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  min-height:100vh;
  font-family:Arial,sans-serif;
  background:linear-gradient(145deg,#061D26,#0F3443);
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
}
.card{
  width:90%;
  max-width:420px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.14);
  border-radius:28px;
  padding:32px;
}
h1{margin:0 0 12px;}
p{color:rgba(255,255,255,.7);}
input,button{
  width:100%;
  box-sizing:border-box;
  padding:16px;
  margin-top:12px;
  border-radius:14px;
  font-size:16px;
}
input{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.18);
  color:white;
}
button{
  border:0;
  background:linear-gradient(135deg,#C7A46A,#E3C986);
  color:#14262C;
  font-weight:900;
}
.msg{
  margin-top:16px;
  padding:14px;
  border-radius:14px;
  background:rgba(255,255,255,.08);
  color:#fff;
  font-size:14px;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="card">
  <h1>Emergys</h1>
  <p>Acesso profissional</p>

  <input id="email" type="email" placeholder="E-mail">
  <input id="senha" type="password" placeholder="Senha">

  <button id="btnLogin" type="button">Acessar plataforma</button>

  <div id="msg" class="msg">Aguardando login...</div>
</div>

<script>
const SUPABASE_URL = "https://uuiuepdpjhpyxhgmveur.supabase.co";
const SUPABASE_KEY = "sb_publishable_AVT257sp6FQB8ZWvjyEfwQ_L2jfJ3tS";

const msg = document.getElementById("msg");
const btn = document.getElementById("btnLogin");

function mostrar(texto){
  msg.textContent = texto;
}

if(!window.supabase){
  mostrar("Erro: biblioteca Supabase não carregou.");
}else{
  mostrar("Supabase carregado. Digite e-mail e senha.");
}

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

btn.addEventListener("click", async function(){

  mostrar("Verificando login...");

  const email = document.getElementById("email").value.trim();
  const senha = document.getElementById("senha").value.trim();

  if(!email || !senha){
    mostrar("Preencha e-mail e senha.");
    return;
  }

  try{

    const { data, error } = await supabaseClient.auth.signInWithPassword({
      email: email,
      password: senha
    });

    if(error){
      mostrar("Erro no login:\n" + error.message);
      return;
    }

    if(!data || !data.user){
      mostrar("Login sem retorno de usuário.");
      return;
    }

    mostrar("Login aceito. Verificando assinatura...");

    const { data: profile, error: profileError } = await supabaseClient
      .from("profiles")
      .select("*")
      .eq("id", data.user.id)
      .single();

    if(profileError){
      mostrar("Erro ao consultar profile:\n" + profileError.message);
      await supabaseClient.auth.signOut();
      return;
    }

    if(!profile){
      mostrar("Usuário sem profile liberado.");
      await supabaseClient.auth.signOut();
      return;
    }

    if(profile.ativo !== true){
      mostrar("Assinatura inativa.");
      await supabaseClient.auth.signOut();
      return;
    }

    if(profile.validade){
      const hoje = new Date();
      hoje.setHours(0,0,0,0);

      const validade = new Date(profile.validade + "T00:00:00");

      if(validade < hoje){
        mostrar("Acesso expirado.");
        await supabaseClient.auth.signOut();
        return;
      }
    }

    mostrar("Acesso liberado. Redirecionando...");
    window.location.href = "app/";

  }catch(e){
    mostrar("Erro inesperado:\n" + e.message);
  }

});
</script>

</body>
</html>
