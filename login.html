<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Emergys | Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --azul:#061D26;
  --azul2:#0F3443;
  --dourado:#C7A46A;
  --salvia:#8AAE92;
  --muted:rgba(255,255,255,.70);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  min-height:100vh;
  font-family:Inter,sans-serif;
  background:
    radial-gradient(circle at 75% 20%,rgba(138,174,146,.24),transparent 32%),
    radial-gradient(circle at 15% 85%,rgba(199,164,106,.17),transparent 36%),
    linear-gradient(145deg,var(--azul),var(--azul2));
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  color:#fff;
}

.card{
  width:100%;
  max-width:440px;
  border-radius:34px;
  padding:34px;
  background:rgba(255,255,255,.075);
  border:1px solid rgba(255,255,255,.13);
  backdrop-filter:blur(18px);
  box-shadow:0 30px 90px rgba(0,0,0,.35);
}

.logo{display:flex;align-items:center;gap:14px;margin-bottom:30px}
.logo-mark{
  width:58px;height:58px;border-radius:18px;
  background:linear-gradient(145deg,var(--azul2),var(--azul));
  display:flex;align-items:center;justify-content:center;
  border:1px solid rgba(199,164,106,.35);
}
.logo-mark svg{width:42px;height:42px;overflow:visible}
.logo-text{font-family:Manrope,sans-serif;font-size:23px;letter-spacing:6px;font-weight:800}
.logo-text span{color:var(--dourado)}
.logo-sub{
  display:block;margin-top:4px;font-family:Inter,sans-serif;
  font-size:9px;letter-spacing:.28em;color:var(--salvia);
  font-weight:700;text-transform:uppercase;
}

h1{font-family:Manrope,sans-serif;font-size:36px;line-height:1.05;letter-spacing:-1.4px;margin-bottom:12px}
p{color:var(--muted);line-height:1.7;font-size:15px;margin-bottom:28px}

label{display:block;margin-bottom:8px;color:var(--dourado);font-size:13px;font-weight:800}

input{
  width:100%;
  padding:16px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:rgba(255,255,255,.08);
  color:#fff;
  font-size:15px;
  outline:none;
  margin-bottom:18px;
}

input::placeholder{color:rgba(255,255,255,.38)}
input:focus{border-color:var(--dourado);box-shadow:0 0 0 3px rgba(199,164,106,.16)}

button{
  width:100%;
  border:0;
  padding:17px;
  border-radius:18px;
  background:linear-gradient(135deg,var(--dourado),#E3C986);
  color:#14262C;
  font-weight:900;
  cursor:pointer;
  font-size:15px;
  transition:.2s ease;
}

button:hover{transform:translateY(-1px)}
button:disabled{opacity:.55;cursor:not-allowed;transform:none}

.secondary-btn{
  margin-top:12px;
  background:rgba(255,255,255,.08);
  color:#fff;
  border:1px solid rgba(255,255,255,.14);
}

.msg{
  display:none;
  margin-top:18px;
  padding:14px;
  border-radius:15px;
  font-size:13px;
  line-height:1.45;
  white-space:pre-wrap;
}

.msg.info{
  display:block;
  background:rgba(255,255,255,.08);
  color:rgba(255,255,255,.82);
  border:1px solid rgba(255,255,255,.12);
}

.msg.erro{
  display:block;
  background:rgba(182,74,74,.14);
  color:#FFD8D8;
  border:1px solid rgba(182,74,74,.35);
}

.msg.sucesso{
  display:block;
  background:rgba(138,174,146,.14);
  color:#DDF5E4;
  border:1px solid rgba(138,174,146,.38);
}

.links{margin-top:18px;display:flex;flex-direction:column;gap:10px}
.links button{padding:15px;font-size:14px}
.hidden{display:none}

.footer{
  margin-top:22px;
  text-align:center;
  font-size:13px;
  color:var(--muted);
}

.footer a{color:var(--dourado);text-decoration:none;font-weight:700}
</style>
</head>

<body>

<div class="card">

  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 140 140" fill="none">
        <path d="M25 98C51 88 74 67 100 30" stroke="#C7A46A" stroke-width="9" stroke-linecap="round"/>
        <path d="M30 111C58 101 84 78 113 44" stroke="#8AAE92" stroke-width="7" stroke-linecap="round"/>
        <path d="M42 124C70 112 96 94 124 64" stroke="#C7A46A" stroke-width="5" stroke-linecap="round"/>
        <path d="M100 30L124 34L113 11" stroke="#C7A46A" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <div>
      <div class="logo-text">EMERG<span>YS</span></div>
      <span class="logo-sub">Health Tech</span>
    </div>
  </div>

  <div id="loginBox">
    <h1>Acesso profissional</h1>

    <p>Entre com seu e-mail e senha para acessar a plataforma Emergys.</p>

    <label>E-mail</label>
    <input type="email" id="email" placeholder="seuemail@email.com" autocomplete="email">

    <label>Senha</label>
    <input type="password" id="senha" placeholder="Digite sua senha" autocomplete="current-password">

    <button id="btnLogin" type="button">Acessar plataforma</button>

    <div class="links">
      <button class="secondary-btn" id="btnPrimeiroAcesso" type="button">
        Primeiro acesso / Criar senha
      </button>

      <button class="secondary-btn" id="btnRecuperar" type="button">
        Esqueci minha senha
      </button>
    </div>
  </div>

  <div id="senhaBox" class="hidden">
    <h1>Criar nova senha</h1>

    <p>Defina uma senha para acessar sua conta Emergys.</p>

    <label>Nova senha</label>
    <input type="password" id="novaSenha" placeholder="Digite uma nova senha" autocomplete="new-password">

    <label>Confirmar senha</label>
    <input type="password" id="confirmarSenha" placeholder="Confirme a nova senha" autocomplete="new-password">

    <button id="btnSalvarSenha" type="button">Salvar nova senha</button>
  </div>

  <div id="msg" class="msg info">
    Digite seu e-mail e senha para continuar.
  </div>

  <div class="footer">
    Emergys © 2026 · <a href="index.html">Voltar ao site</a>
  </div>

</div>

<script>
const SUPABASE_URL = "https://uuiuepdpjhpyxhgmveur.supabase.co";
const SUPABASE_KEY = "sb_publishable_AVT257sp6FQB8ZWvjyEfwQ_L2jfJ3tS";

const msg = document.getElementById("msg");
const loginBox = document.getElementById("loginBox");
const senhaBox = document.getElementById("senhaBox");

const btnLogin = document.getElementById("btnLogin");
const btnPrimeiroAcesso = document.getElementById("btnPrimeiroAcesso");
const btnRecuperar = document.getElementById("btnRecuperar");
const btnSalvarSenha = document.getElementById("btnSalvarSenha");

function mostrar(texto, tipo="info"){
  msg.className = "msg " + tipo;
  msg.textContent = texto;
}

const supabaseClient = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

btnLogin.addEventListener("click", login);
btnPrimeiroAcesso.addEventListener("click", solicitarCriacaoSenha);
btnRecuperar.addEventListener("click", solicitarCriacaoSenha);
btnSalvarSenha.addEventListener("click", salvarNovaSenha);

document.getElementById("senha").addEventListener("keydown", function(e){
  if(e.key === "Enter") login();
});

function abrirTelaSenha(){
  loginBox.classList.add("hidden");
  senhaBox.classList.remove("hidden");
  mostrar("Defina sua nova senha para concluir o acesso.", "info");
}

async function detectarLinkSupabase(){
  const hash = window.location.hash || "";
  const search = window.location.search || "";

  const temToken =
    hash.includes("access_token") ||
    hash.includes("refresh_token") ||
    search.includes("code=") ||
    search.includes("type=recovery") ||
    search.includes("type=invite");

  if(!temToken) return;

  mostrar("Validando link de acesso...", "info");

  try{
    const { data } = await supabaseClient.auth.getSession();

    if(data && data.session){
      abrirTelaSenha();
      return;
    }

    setTimeout(async function(){
      const { data: data2 } = await supabaseClient.auth.getSession();

      if(data2 && data2.session){
        abrirTelaSenha();
      }else{
        mostrar("Link aberto, mas a sessão não foi detectada. Solicite um novo link.", "erro");
      }
    }, 1200);

  }catch(e){
    mostrar("Erro ao validar o link de acesso.", "erro");
  }
}

async function validarAssinatura(user){
  const email = user.email;

  const { data: profile, error } = await supabaseClient
    .from("profiles")
    .select("ativo, validade, plano")
    .eq("email", email)
    .maybeSingle();

  if(error){
    await supabaseClient.auth.signOut();
    mostrar("Não foi possível consultar sua assinatura. Tente novamente ou acione o suporte.", "erro");
    return false;
  }

  if(!profile){
    await supabaseClient.auth.signOut();
    mostrar("Usuário sem assinatura vinculada. Regularize o acesso para continuar.", "erro");
    return false;
  }

  if(profile.ativo !== true){
    await supabaseClient.auth.signOut();
    mostrar("Sua assinatura está inativa. Regularize o pagamento para continuar.", "erro");
    return false;
  }

  if(profile.validade){
    const hoje = new Date();
    hoje.setHours(0,0,0,0);

    const validade = new Date(profile.validade + "T23:59:59");

    if(validade < hoje){
      await supabaseClient.auth.signOut();
      mostrar("Seu acesso expirou. Renove sua assinatura para continuar.", "erro");
      return false;
    }
  }

  return true;
}

async function login(){
  const email = document.getElementById("email").value.trim();
  const senha = document.getElementById("senha").value.trim();

  if(!email || !senha){
    mostrar("Preencha e-mail e senha.", "erro");
    return;
  }

  btnLogin.disabled = true;
  btnLogin.textContent = "Verificando...";
  mostrar("Verificando credenciais...", "info");

  try{
    const { data, error } = await supabaseClient.auth.signInWithPassword({
      email,
      password: senha
    });

    if(error || !data.user){
      mostrar("E-mail ou senha inválidos.", "erro");
      btnLogin.disabled = false;
      btnLogin.textContent = "Acessar plataforma";
      return;
    }

    mostrar("Login aceito. Verificando assinatura...", "info");

    const assinaturaOk = await validarAssinatura(data.user);

    if(!assinaturaOk){
      btnLogin.disabled = false;
      btnLogin.textContent = "Acessar plataforma";
      return;
    }

    mostrar("Acesso liberado. Redirecionando...", "sucesso");
    window.location.href = "app/";

  }catch(e){
    mostrar("Erro inesperado ao realizar login.", "erro");
    btnLogin.disabled = false;
    btnLogin.textContent = "Acessar plataforma";
  }
}

async function solicitarCriacaoSenha(){
  const email = document.getElementById("email").value.trim();

  if(!email){
    mostrar("Digite seu e-mail para receber o link de criação ou recuperação de senha.", "erro");
    return;
  }

  btnPrimeiroAcesso.disabled = true;
  btnRecuperar.disabled = true;

  mostrar("Enviando e-mail de acesso...", "info");

  try{
    const resposta = await fetch("/api/enviar-convite", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email })
    });

    let resultado = {};

    try{
      resultado = await resposta.json();
    }catch(e){}

    if(!resposta.ok){
      mostrar("Não foi possível enviar o e-mail: " + (resultado.error || "erro desconhecido"), "erro");
      btnPrimeiroAcesso.disabled = false;
      btnRecuperar.disabled = false;
      return;
    }

    mostrar("E-mail enviado com sucesso.\n\nAbra o link recebido para criar ou alterar sua senha.", "sucesso");

  }catch(e){
    mostrar("Erro inesperado ao enviar o e-mail de acesso.", "erro");
  }

  btnPrimeiroAcesso.disabled = false;
  btnRecuperar.disabled = false;
}

async function salvarNovaSenha(){
  const novaSenha = document.getElementById("novaSenha").value.trim();
  const confirmarSenha = document.getElementById("confirmarSenha").value.trim();

  if(!novaSenha || !confirmarSenha){
    mostrar("Preencha os dois campos de senha.", "erro");
    return;
  }

  if(novaSenha.length < 6){
    mostrar("A senha deve ter pelo menos 6 caracteres.", "erro");
    return;
  }

  if(novaSenha !== confirmarSenha){
    mostrar("As senhas não coincidem.", "erro");
    return;
  }

  btnSalvarSenha.disabled = true;
  btnSalvarSenha.textContent = "Salvando...";

  try{
    const { data, error } = await supabaseClient.auth.updateUser({
      password: novaSenha
    });

    if(error){
      mostrar("Não foi possível salvar a senha. Solicite um novo link.", "erro");
      btnSalvarSenha.disabled = false;
      btnSalvarSenha.textContent = "Salvar nova senha";
      return;
    }

    const { data: userData } = await supabaseClient.auth.getUser();

    if(userData && userData.user){
      const assinaturaOk = await validarAssinatura(userData.user);

      if(!assinaturaOk){
        btnSalvarSenha.disabled = false;
        btnSalvarSenha.textContent = "Salvar nova senha";
        return;
      }
    }

    mostrar("Senha criada com sucesso. Redirecionando para a plataforma...", "sucesso");

    setTimeout(function(){
      window.location.href = "app/";
    }, 1200);

  }catch(e){
    mostrar("Erro inesperado ao salvar a senha.", "erro");
    btnSalvarSenha.disabled = false;
    btnSalvarSenha.textContent = "Salvar nova senha";
  }
}

detectarLinkSupabase();
</script>

</body>
</html>
