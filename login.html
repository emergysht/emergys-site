<html lang="pt-BR"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emergys | Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;family=Manrope:wght@600;700;800&amp;display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--azul:#061D26;--azul2:#0F3443;--dourado:#C7A46A;--salvia:#8AAE92;--branco:#FFFFFF;--muted:rgba(255,255,255,.68);--erro:#B64A4A;}
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;font-family:Inter,sans-serif;background:radial-gradient(circle at 75% 20%,rgba(138,174,146,.22),transparent 32%),radial-gradient(circle at 15% 85%,rgba(199,164,106,.16),transparent 36%),linear-gradient(145deg,var(--azul),var(--azul2));display:flex;align-items:center;justify-content:center;padding:24px;color:#fff;}
.card{width:100%;max-width:430px;border-radius:34px;padding:34px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(18px);box-shadow:0 30px 90px rgba(0,0,0,.35)}
.logo{display:flex;align-items:center;gap:14px;margin-bottom:30px}.logo-mark{width:58px;height:58px;border-radius:18px;background:linear-gradient(145deg,var(--azul2),var(--azul));display:flex;align-items:center;justify-content:center;border:1px solid rgba(199,164,106,.35)}.logo-mark svg{width:42px;height:42px}.logo-text{font-family:Manrope,sans-serif;font-size:23px;letter-spacing:6px;font-weight:800}.logo-text span{color:var(--dourado)}
h1{font-family:Manrope,sans-serif;font-size:38px;line-height:1;margin-bottom:14px}p{color:var(--muted);line-height:1.7;margin-bottom:28px}label{display:block;margin-bottom:8px;color:var(--dourado);font-size:13px;font-weight:800}input{width:100%;padding:16px;border-radius:16px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.08);color:#fff;font-size:15px;outline:none;margin-bottom:18px}input:focus{border-color:var(--dourado)}button{width:100%;border:0;padding:17px;border-radius:18px;background:linear-gradient(135deg,var(--dourado),#E3C986);color:#14262C;font-weight:900;cursor:pointer;font-size:15px}button:hover{transform:translateY(-1px)}.erro{display:none;margin-top:18px;padding:14px;border-radius:14px;background:rgba(182,74,74,.14);border:1px solid rgba(182,74,74,.35);color:#FFD8D8;font-size:13px}.loading{opacity:.6;pointer-events:none}.footer{margin-top:22px;text-align:center;font-size:13px;color:var(--muted)}.links{display:grid;gap:10px;margin-top:18px;text-align:center}.links a{color:var(--muted);font-size:13px;text-decoration:none}.links a:hover{color:#fff}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 140 140" fill="none" aria-hidden="true">
        <path d="M25 98C51 88 74 67 100 30" stroke="#C7A46A" stroke-width="9" stroke-linecap="round"></path>
        <path d="M30 111C58 101 84 78 113 44" stroke="#8AAE92" stroke-width="7" stroke-linecap="round"></path>
        <path d="M42 124C70 112 96 94 124 64" stroke="#C7A46A" stroke-width="5" stroke-linecap="round"></path>
        <path d="M100 30L124 34L113 11" stroke="#C7A46A" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"></path>
      </svg>
    </div>
    <div class="logo-text">EMERG<span>YS</span></div>
  </div>

  <h1>Acesso profissional</h1>
  <p>Entre com seu e-mail e senha para acessar a plataforma Emergys.</p>

  <label>E-mail</label>
  <input type="email" id="email" placeholder="seuemail@email.com" autocomplete="email">

  <label>Senha</label>
  <input type="password" id="senha" placeholder="Digite sua senha" autocomplete="current-password" onkeydown="if(event.key==='Enter') login()">

  <button onclick="login()">Acessar plataforma</button>

  <div id="erro" class="erro"></div>

  <div class="links">
    <a href="index.html">Voltar para a página inicial</a>
  </div>

  <div class="footer">Emergys © 2026</div>
</div>

<script>
const supabaseUrl = 'https://uuiuepdpjhpyxhgmveur.supabase.co';
const supabaseKey = 'sb_publishable_AVT257sp6FQB8ZWvjyEfwQ_L2jfJ3tS';
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

async function login(){
  const email = document.getElementById('email').value.trim();
  const senha = document.getElementById('senha').value.trim();
  const erro = document.getElementById('erro');
  const card = document.getElementById('card');

  erro.style.display = 'none';
  erro.innerHTML = '';

  if(!email || !senha){
    erro.innerHTML = 'Preencha e-mail e senha.';
    erro.style.display = 'block';
    return;
  }

  card.classList.add('loading');

  const { data, error } = await supabase.auth.signInWithPassword({email: email,password: senha});

  if(error){
    erro.innerHTML = 'E-mail ou senha inválidos.';
    erro.style.display = 'block';
    card.classList.remove('loading');
    return;
  }

  const user = data.user;

  const { data: profile, error: profileError } = await supabase
    .from('profiles')
    .select('*')
    .eq('id', user.id)
    .single();

  if(profileError || !profile){
    erro.innerHTML = 'Conta sem permissão de acesso. Entre em contato com o suporte.';
    erro.style.display = 'block';
    await supabase.auth.signOut();
    card.classList.remove('loading');
    return;
  }

  if(profile.ativo !== true){
    erro.innerHTML = 'Assinatura inativa. Entre em contato com o suporte.';
    erro.style.display = 'block';
    await supabase.auth.signOut();
    card.classList.remove('loading');
    return;
  }

  if(profile.validade){
    const hoje = new Date();
    hoje.setHours(0,0,0,0);
    const validade = new Date(profile.validade + 'T23:59:59');
    if(validade < hoje){
      erro.innerHTML = 'Seu acesso expirou. Renove sua assinatura para continuar.';
      erro.style.display = 'block';
      await supabase.auth.signOut();
      card.classList.remove('loading');
      return;
    }
  }

  window.location.href = 'app/';
}

async function verificarSessao(){
  const params = new URLSearchParams(window.location.search);
  if(params.get('expired') === '1'){
    const erro = document.getElementById('erro');
    erro.innerHTML = 'Seu acesso expirou. Renove sua assinatura para continuar.';
    erro.style.display = 'block';
  }
  const { data: { session } } = await supabase.auth.getSession();
  if(session){ window.location.href = 'app/'; }
}
verificarSessao();
</script>


</body></html>
